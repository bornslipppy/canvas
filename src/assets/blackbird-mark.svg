<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 89 50" width="89" height="50" role="img" aria-label="Blackbird mark">
  <defs>
    <mask id="blackbird-silhouette" mask-type="alpha" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="0" y="0" width="89" height="50">
      <image width="89" height="50" href="data:image/png;base64," />
    </mask>
  </defs>
